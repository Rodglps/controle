spring:
  # Datasource Configuration - Oracle XE Local
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    username: system
    password: Oracle123
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ControleArquivosHikariPool
      auto-commit: false
      connection-test-query: SELECT 1 FROM DUAL

  # RabbitMQ Configuration - Local
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    connection-timeout: 30000
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3
        multiplier: 2.0

  # JPA Configuration
  jpa:
    show-sql: true

# AWS Configuration - LocalStack
aws:
  region: us-east-1
  s3:
    endpoint: http://localhost:4566
    bucket-name: controle-arquivos-local
    path-style-access: true
  credentials:
    access-key: test
    secret-key: test

# SFTP Configuration - Local
sftp:
  default:
    host: localhost
    port: 2222
    username: sftpuser
    password: sftppass
    timeout: 30000
    session-timeout: 60000
    channel-timeout: 30000

# Vault Configuration - Disabled for local
vault:
  enabled: false
  uri: http://localhost:8200
  token: dev-token
  kv:
    enabled: true
    backend: secret
    default-context: controle-arquivos

# Logging
logging:
  level:
    root: INFO
    com.controle.arquivos: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.amazonaws: DEBUG
    software.amazon.awssdk: DEBUG

# Application Configuration
app:
  scheduler:
    enabled: true
    cron: "0 */5 * * * *"  # Every 5 minutes
  processing:
    timeout-seconds: 600  # 10 minutes for local testing
