spring:
  # Datasource Configuration - Oracle RDS Production
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ControleArquivosHikariPool
      auto-commit: false
      connection-test-query: SELECT 1 FROM DUAL
      leak-detection-threshold: 60000
      register-mbeans: true

  # RabbitMQ Configuration - AWS MQ Production
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: true
      algorithm: TLSv1.2
    connection-timeout: 30000
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 20
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 5
          multiplier: 2.0
        concurrency: 10
        max-concurrency: 50
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      retry:
        enabled: true
        initial-interval: 2000
        max-attempts: 5
        multiplier: 2.0

# AWS Configuration - Real AWS Production
aws:
  region: ${AWS_REGION}
  s3:
    bucket-name: ${S3_BUCKET_NAME}
    path-style-access: false
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

# SFTP Configuration - External servers via Vault
sftp:
  timeout: 30000
  session-timeout: 120000
  channel-timeout: 60000
  strict-host-key-checking: true
  known-hosts-file: ${SFTP_KNOWN_HOSTS_FILE:/app/config/known_hosts}

# Vault Configuration - Enabled
vault:
  enabled: true
  uri: ${VAULT_URI}
  token: ${VAULT_TOKEN}
  kv:
    enabled: true
    backend: secret
    default-context: controle-arquivos/prod
  connection-timeout: 5000
  read-timeout: 15000

# Logging
logging:
  level:
    root: WARN
    com.controle.arquivos: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN

# Application Configuration
app:
  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}
    cron: ${SCHEDULER_CRON:0 */5 * * * *}  # Every 5 minutes
  processing:
    timeout-seconds: 300
  retry:
    max-attempts: 5
    backoff-delay: 3000
  streaming:
    chunk-size: 10485760  # 10MB chunks for production
