apiVersion: v1
kind: ConfigMap
metadata:
  name: controle-arquivos-config
  labels:
    app: controle-arquivos
    environment: dev
data:
  # RabbitMQ Configuration
  rabbitmq-port: "5671"
  rabbitmq-vhost: "/"
  
  # AWS Configuration
  aws-region: "us-east-1"
  s3-bucket-name: "controle-arquivos-dev"
  
  # Scheduler Configuration
  scheduler-enabled: "true"
  scheduler-cron: "0 */10 * * * *"  # Every 10 minutes
  
  # Application Configuration
  streaming-chunk-size: "5242880"  # 5MB
  streaming-buffer-size: "8192"    # 8KB
  retry-max-attempts: "3"
  retry-backoff-delay: "2000"      # 2 seconds
  processing-timeout-seconds: "300"
  processing-max-reprocessing-attempts: "5"
  
  # Logging Configuration
  log-level-root: "INFO"
  log-level-app: "DEBUG"
  log-level-spring: "WARN"
  log-level-hibernate: "WARN"
  
  # Database Configuration
  db-hikari-max-pool-size: "20"
  db-hikari-min-idle: "5"
  db-hikari-connection-timeout: "30000"
  
  # RabbitMQ Listener Configuration
  rabbitmq-listener-prefetch: "5"
  rabbitmq-listener-concurrency: "2"
  rabbitmq-listener-max-concurrency: "10"
