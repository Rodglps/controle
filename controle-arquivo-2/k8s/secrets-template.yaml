apiVersion: v1
kind: Secret
metadata:
  name: controle-arquivos-secrets
  labels:
    app: controle-arquivos
type: Opaque
stringData:
  # Database Credentials
  # Replace with actual values before applying
  db-url: "jdbc:oracle:thin:@<ORACLE_HOST>:<ORACLE_PORT>:<ORACLE_SID>"
  db-username: "<DB_USERNAME>"
  db-password: "<DB_PASSWORD>"
  
  # RabbitMQ Credentials
  rabbitmq-host: "<RABBITMQ_HOST>"
  rabbitmq-username: "<RABBITMQ_USERNAME>"
  rabbitmq-password: "<RABBITMQ_PASSWORD>"
  
  # Vault Credentials
  vault-uri: "https://<VAULT_HOST>"
  vault-token: "<VAULT_TOKEN>"
  
  # AWS Credentials (for Processor)
  aws-access-key-id: "<AWS_ACCESS_KEY_ID>"
  aws-secret-access-key: "<AWS_SECRET_ACCESS_KEY>"

---
# Example of how to create the secret from command line:
# kubectl create secret generic controle-arquivos-secrets \
#   --from-literal=db-url='jdbc:oracle:thin:@oracle.example.com:1521:ORCL' \
#   --from-literal=db-username='app_user' \
#   --from-literal=db-password='SecurePassword123!' \
#   --from-literal=rabbitmq-host='rabbitmq.example.com' \
#   --from-literal=rabbitmq-username='app_user' \
#   --from-literal=rabbitmq-password='SecurePassword123!' \
#   --from-literal=vault-uri='https://vault.example.com' \
#   --from-literal=vault-token='hvs.XXXXXXXXXXXXXX' \
#   --from-literal=aws-access-key-id='AKIAIOSFODNN7EXAMPLE' \
#   --from-literal=aws-secret-access-key='wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY'

---
# Alternative: Use external secret management tools like:
# - AWS Secrets Manager with External Secrets Operator
# - HashiCorp Vault with Vault Secrets Operator
# - Sealed Secrets for GitOps workflows
