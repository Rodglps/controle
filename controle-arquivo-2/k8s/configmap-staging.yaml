apiVersion: v1
kind: ConfigMap
metadata:
  name: controle-arquivos-config
  labels:
    app: controle-arquivos
    environment: staging
data:
  # RabbitMQ Configuration
  rabbitmq-port: "5671"
  rabbitmq-vhost: "/"
  
  # AWS Configuration
  aws-region: "us-east-1"
  s3-bucket-name: "controle-arquivos-staging"
  
  # Scheduler Configuration
  scheduler-enabled: "true"
  scheduler-cron: "0 */7 * * * *"  # Every 7 minutes
  
  # Application Configuration
  streaming-chunk-size: "10485760"  # 10MB
  streaming-buffer-size: "8192"     # 8KB
  retry-max-attempts: "4"
  retry-backoff-delay: "2500"       # 2.5 seconds
  processing-timeout-seconds: "300"
  processing-max-reprocessing-attempts: "5"
  
  # Logging Configuration
  log-level-root: "INFO"
  log-level-app: "INFO"
  log-level-spring: "WARN"
  log-level-hibernate: "WARN"
  
  # Database Configuration
  db-hikari-max-pool-size: "30"
  db-hikari-min-idle: "10"
  db-hikari-connection-timeout: "30000"
  
  # RabbitMQ Listener Configuration
  rabbitmq-listener-prefetch: "10"
  rabbitmq-listener-concurrency: "5"
  rabbitmq-listener-max-concurrency: "20"
