apiVersion: apps/v1
kind: Deployment
metadata:
  name: controle-arquivos-processor
  labels:
    app: controle-arquivos
    component: processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: controle-arquivos
      component: processor
  template:
    metadata:
      labels:
        app: controle-arquivos
        component: processor
    spec:
      containers:
      - name: processor
        image: controle-arquivos-processor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: db-url
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: db-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: db-password
        - name: RABBITMQ_HOST
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: rabbitmq-host
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: controle-arquivos-config
              key: rabbitmq-port
        - name: RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: rabbitmq-username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: rabbitmq-password
        - name: RABBITMQ_VHOST
          valueFrom:
            configMapKeyRef:
              name: controle-arquivos-config
              key: rabbitmq-vhost
        - name: VAULT_URI
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: vault-uri
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: vault-token
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: controle-arquivos-config
              key: aws-region
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: controle-arquivos-secrets
              key: aws-secret-access-key
        - name: S3_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: controle-arquivos-config
              key: s3-bucket-name
        - name: SFTP_KNOWN_HOSTS_FILE
          value: "/app/config/known_hosts"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: controle-arquivos-processor-hpa
  labels:
    app: controle-arquivos
    component: processor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: controle-arquivos-processor
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
