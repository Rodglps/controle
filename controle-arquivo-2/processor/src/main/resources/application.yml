spring:
  application:
    name: controle-arquivos-processor
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 5
          multiplier: 2.0
          max-interval: 30000

rabbitmq:
  queue:
    processamento: ${RABBITMQ_QUEUE_PROCESSAMENTO:file-processing-queue}

# Management Endpoints (inherited from common, but can be overridden here if needed)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

