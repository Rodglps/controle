spring:
  application:
    name: controle-arquivos-integration-tests
  
  # Database configuration (overridden by Testcontainers)
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA configuration
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
  
  # RabbitMQ configuration (overridden by Testcontainers)
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

# AWS configuration (overridden by Testcontainers)
aws:
  s3:
    region: us-east-1
    bucket: test-bucket

# SFTP configuration (overridden by Testcontainers)
sftp:
  connection-timeout: 30000
  session-timeout: 60000

# Logging configuration
logging:
  level:
    root: INFO
    com.controle.arquivos: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
    org.testcontainers: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Test-specific configuration
test:
  timeout:
    short: 30
    medium: 60
    long: 120
  performance:
    small-file-size: 10485760  # 10MB
    medium-file-size: 104857600  # 100MB
    large-file-size: 1073741824  # 1GB
    memory-threshold: 52428800  # 50MB
