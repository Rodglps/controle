# Application Configuration for Orchestrator
app:
  rabbitmq:
    exchange: controle-arquivos-exchange
    queue: processamento-queue
    routing-key: processamento
  
  scheduler:
    coleta:
      # Cron expression para execução periódica do ciclo de coleta
      # Padrão: a cada 5 minutos (0 */5 * * * *)
      # Formato: segundo minuto hora dia mês dia-da-semana
      cron: "0 */5 * * * *"
