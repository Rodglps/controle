version: '3.8'

services:
  # Oracle XE Database
  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: controle-arquivos-oracle
    environment:
      - ORACLE_PWD=Oracle123
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts/ddl:/docker-entrypoint-initdb.d/startup
    networks:
      - controle-arquivos-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/Oracle123@//localhost:1521/XE"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: controle-arquivos-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
      - RABBITMQ_DEFAULT_VHOST=/
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - rabbitmq-logs:/var/log/rabbitmq
    networks:
      - controle-arquivos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # LocalStack (AWS S3 Simulation)
  localstack:
    image: localstack/localstack:3.0
    container_name: controle-arquivos-localstack
    environment:
      - SERVICES=s3
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    volumes:
      - localstack-data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/localstack:/docker-entrypoint-initaws.d
    networks:
      - controle-arquivos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # SFTP Server
  sftp:
    image: atmoz/sftp:alpine
    container_name: controle-arquivos-sftp
    command: sftpuser:sftppass:1001:100:upload
    ports:
      - "2222:22"
    volumes:
      - sftp-data:/home/sftpuser/upload
      - ./scripts/sftp:/home/sftpuser/upload/test-files
    networks:
      - controle-arquivos-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  controle-arquivos-network:
    driver: bridge
    name: controle-arquivos-network

volumes:
  oracle-data:
    name: controle-arquivos-oracle-data
  rabbitmq-data:
    name: controle-arquivos-rabbitmq-data
  rabbitmq-logs:
    name: controle-arquivos-rabbitmq-logs
  localstack-data:
    name: controle-arquivos-localstack-data
  sftp-data:
    name: controle-arquivos-sftp-data
