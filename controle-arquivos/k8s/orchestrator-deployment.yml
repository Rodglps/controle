apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: controle-arquivos
  labels:
    app: orchestrator
spec:
  replicas: 1  # apenas 1 réplica para evitar coleta duplicada
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: controle-arquivos/orchestrator:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: controle-arquivos-config
            - secretRef:
                name: controle-arquivos-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: controle-arquivos
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8080
      targetPort: 8080
