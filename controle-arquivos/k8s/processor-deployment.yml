apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: controle-arquivos
  labels:
    app: processor
spec:
  replicas: 2  # múltiplas réplicas para paralelismo no consumo da fila
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: controle-arquivos/processor:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: controle-arquivos-config
            - secretRef:
                name: controle-arquivos-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: processor-service
  namespace: controle-arquivos
spec:
  selector:
    app: processor
  ports:
    - port: 8080
      targetPort: 8080
